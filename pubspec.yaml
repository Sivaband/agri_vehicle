name: agri_vehicle_app
description: Agri Vehicle Management System - Track tractors, JCB, and harvesters
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  intl: ^0.20.2

  # Speech to Text
  speech_to_text: ^7.0.0

  # UUID
  uuid: ^4.2.1

  # Icons
  cupertino_icons: ^1.0.6

  # Location & Mapping
  geolocator: ^11.0.0
  maps_toolkit: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

